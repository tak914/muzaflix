<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Muzaflix</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff66">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    /* ─── RESET & VARIABLES VERDES ──────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050705;
      --surface:   #0d110d;
      --border:    rgba(0,255,102,0.08);
      --accent:    #00ff66;
      --accent2:   #00b3ff;
      --gold:      #f5c518;
      --text:      #e2eee2;
      --muted:     #668872;
      --glass-bg:  rgba(5,10,6,0.8);
      --glass-border: rgba(0,255,102,0.15);
      --card-w:    200px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── EFECTO DE RUIDO MATRIX ────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
      opacity: 0.25;
    }

    /* ─── SCROLLBAR VERDE ───────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #00ff66; border-radius: 2px; }

    /* ─── HEADER ────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 68px;
      background: linear-gradient(180deg, rgba(5,7,5,0.98) 0%, rgba(5,7,5,0.85) 100%);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }
    .logo span { color: #fff; -webkit-text-fill-color: #fff; }

    /* BOTÓN INSTALAR PWA */
    #pwa-install-btn {
      background: rgba(0, 255, 102, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: none; /* Se enciende si Chrome da permiso */
      margin-right: 15px;
      transition: background 0.2s;
    }
    #pwa-install-btn:hover { background: var(--accent); color: #000; }

    .search-wrap { position: relative; display: flex; align-items: center; flex: 0 1 340px; }
    .search-wrap svg { position: absolute; left: 14px; width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
    #search {
      width: 100%; background: rgba(0,255,102,0.03); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 14px 9px 40px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; outline: none;
    }
    #search:focus { border-color: var(--accent); background: rgba(0,255,102,0.07); }
    #search:focus ~ svg { color: var(--accent); }

    /* ─── HERO STRIP ─────────────────────────────────────── */
    .hero { padding: 56px 40px 0; display: flex; align-items: flex-end; gap: 4px; }
    .hero-label { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4rem, 5vw, 4rem); letter-spacing: 2px; color: #fff; }
    .hero-label em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-sub { padding: 10px 40px 32px; color: var(--muted); font-size: 0.875rem; }

    /* ─── SECTION ────────────────────────────────────────── */
    .section { padding: 0 40px 60px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

    /* ─── GRID & CARDS ───────────────────────────────────── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr)); gap: 18px; }
    .card {
      position: relative; width: 100%; aspect-ratio: 2/3; border-radius: 10px; overflow: hidden;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      animation: fadeSlide 0.5s ease both;
    }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover { transform: scale(1.05) translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-color: var(--accent); }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; }
    .card-title { font-size: 0.8rem; font-weight: 500; color: #fff; margin-bottom: 6px; }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--muted); }
    .card-rating { color: var(--gold); font-weight: 500; }
    
    .play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 44px; height: 44px; background: rgba(0, 255, 102, 0.9); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
    }
    .card:hover .play-btn { opacity: 1; }
    .play-btn svg { width: 18px; height: 18px; fill: #000; margin-left: 3px; }

    /* ─── SKELETON ───────────────────────────────────────── */
    .skeleton { background: var(--surface); border-radius: 10px; aspect-ratio: 2/3; position: relative; overflow: hidden; border: 1px solid var(--border); }
    .skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(0,255,102,0.03), transparent); animation: shimmer 1.5s infinite; }
    @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    /* ─── MODAL VERDE MULTIMEDIA ─────────────────────────── */
    #modal-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    #modal-backdrop.open { opacity: 1; pointer-events: all; }

    #modal { background: var(--glass-bg); border: 1px solid var(--glass-border); radius: 16px; width: 100%; max-width: 960px; max-height: 90vh; overflow-y: auto; box-shadow: 0 40px 100px rgba(0,0,0,0.9); transition: transform 0.3s ease; }
    .modal-header { position: relative; height: 320px; overflow: hidden; }
    #modal-backdrop-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
    .modal-header-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(to top, var(--bg), transparent); }
    .modal-header-content { position: absolute; bottom: 24px; left: 28px; right: 28px; }
    #modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: #fff; }
    
    .modal-tags { display: flex; gap: 8px; margin-top: 10px; }
    .modal-tag { padding: 3px 10px; border-radius: 4px; font-size: 0.7rem; background: rgba(0,255,102,0.08); border: 1px solid rgba(0,255,102,0.2); color: #fff; }
    .modal-tag.year { color: var(--accent); }

    /* CONTROLES DEL MODAL */
    #close-btn { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 12; }
    #close-btn:hover { background: #ff3333; }
    
    #fullscreen-btn { position: absolute; top: 16px; right: 64px; width: 36px; height: 36px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 50%; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 12; font-size: 1rem; }
    #fullscreen-btn:hover { background: var(--accent); color: #000; }

    .modal-body { padding: 24px 28px; }
    #modal-overview { font-size: 0.92rem; line-height: 1.7; color: #ccc; margin-bottom: 24px; }

    /* REPRODUCTOR */
    .player-wrap { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #000; border: 1px solid var(--border); }
    #movie-frame { width: 100%; height: 100%; border: none; display: block; }
    .player-note { margin-top: 10px; font-size: 0.72rem; color: var(--muted); text-align: center; }

    /* ─── MODAL COMPLETO FORZADO POR CSS ─────────────────── */
    #modal.forced-fullscreen { position: fixed !important; inset: 0 !important; width: 100vw !important; max-width: 100vw !important; height: 100vh !important; max-height: 100vh !important; border-radius: 0 !important; z-index: 9999 !important; }
    #modal.forced-fullscreen .modal-header, #modal.forced-fullscreen #modal-overview, #modal.forced-fullscreen .player-note { display: none !important; }
    #modal.forced-fullscreen .modal-body { padding: 0 !important; height: 100vh !important; }
    #modal.forced-fullscreen .player-wrap { width: 100vw !important; height: 100vh !important; border-radius: 0 !important; border: none !important; }

    @media (max-width: 600px) { header { padding: 0 16px; } :root { --card-w: 140px; } .modal-header { height: 220px; } }
  </style>
</head>
<body>

  <header>
    <div class="logo">Muza<span>flix</span></div>
    <div style="display: flex; align-items: center;">
      <button id="pwa-install-btn">Instalar Muzaflix 📲</button>
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Buscar película…" autocomplete="off" />
      </div>
    </div>
  </header>

  <div class="hero">
    <h1 class="hero-label">En <em>Muzaflix</em></h1>
  </div>
  <p class="hero-sub">El catálogo definitivo en color neón · Conexión PlayIMDb automatizada</p>

  <section class="section">
    <div class="section-title">Populares Ahora</div>
    <div class="grid" id="grid"></div>
  </section>

  <div id="modal-backdrop" role="dialog" aria-modal="true">
    <div id="modal">
      <div class="modal-header">
        <img id="modal-backdrop-img" src="" alt="" />
        <div class="modal-header-gradient"></div>
        <button id="close-btn" aria-label="Cerrar">✕</button>
        <button id="fullscreen-btn" title="Pantalla Completa">⛶</button>
        <div class="modal-header-content">
          <h2 id="modal-title"></h2>
          <div class="modal-tags" id="modal-tags"></div>
        </div>
      </div>
      <div class="modal-body">
        <p id="modal-overview"></p>
        <div class="player-wrap">
          <iframe id="movie-frame" src="" allowfullscreen allow="fullscreen" loading="lazy"></iframe>
        </div>
        <p class="player-note">Servidor PlayIMDb Activo. Si el botón interno de pantalla grande falla, usa nuestro botón ⛶ de arriba.</p>
      </div>
    </div>
  </div>

  <script>
    const API_KEY       = "3eea574ca84276b797d37e87d0d1983f";          
    const STREAM_SERVER = "https://www.playimdb.com/title/"; 
    const IMG_BASE      = "https://image.tmdb.org/t/p/w500";
    const IMG_BASE_LG   = "https://image.tmdb.org/t/p/w1280";
    const API_BASE      = "https://api.themoviedb.org/3";

    let allMovies  = [];
    let displayed  = [];

    const grid       = document.getElementById("grid");
    const backdrop   = document.getElementById("modal-backdrop");
    const closeBtn   = document.getElementById("close-btn");
    const fsBtn      = document.getElementById("fullscreen-btn");
    const searchEl   = document.getElementById("search");
    const movieFrame = document.getElementById("movie-frame");

    /* ─── API TMDb CATALOGO ─────────────────────────────── */
    async function loadMovies() {
      renderSkeletons(20);
      try {
        const url = `${API_BASE}/movie/popular?api_key=${API_KEY}&language=es-MX`;
        const res = await fetch(url);
        const data = await res.json();
        allMovies = data.results.slice(0, 20);
        displayed = allMovies;
        renderGrid(displayed);
      } catch (err) {
        grid.innerHTML = `<div class="state-msg"><h3>Error al conectar</h3></div>`;
      }
    }

    function renderGrid(movies) {
      grid.innerHTML = "";
      movies.forEach((m, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${i * 0.04}s`;
        const posterUrl = m.poster_path ? `${IMG_BASE}${m.poster_path}` : null;
        const year = m.release_date ? m.release_date.slice(0, 4) : "–";
        const rating = m.vote_average ? m.vote_average.toFixed(1) : "–";

        card.innerHTML = `
          ${posterUrl ? `<img src="${posterUrl}" alt="${m.title}" loading="lazy"/>` : `<div class="no-poster"><span>Sin Póster</span></div>`}
          <div class="card-overlay">
            <div class="card-title">${m.title}</div>
            <div class="card-meta"><span class="card-rating">★ ${rating}</span><span>• ${year}</span></div>
          </div>
          <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        `;
        card.addEventListener("click", () => openModal(m));
        grid.appendChild(card);
      });
    }

    /* ─── LOGICA DE CONCATENACIÓN AUTOMÁTICA tt DE IMDB ── */
    async function openModal(movie) {
      document.getElementById("modal-title").textContent = movie.title;
      document.getElementById("modal-overview").textContent = movie.overview || "Sin sinopsis.";
      document.getElementById("modal-backdrop-img").src = movie.backdrop_path ? `${IMG_BASE_LG}${movie.backdrop_path}` : '';
      
      const tagsContainer = document.getElementById("modal-tags");
      tagsContainer.innerHTML = `<span class="modal-tag year">${movie.release_date ? movie.release_date.slice(0, 4) : '–'}</span><span class="modal-tag">★ ${movie.vote_average.toFixed(1)}</span>`;

      backdrop.classList.add("open");
      document.body.style.overflow = "hidden";

      try {
        const resDetail = await fetch(`${API_BASE}/movie/${movie.id}?api_key=${API_KEY}`);
        const movieData = await resDetail.json();
        if (movieData.imdb_id) {
          movieFrame.src = `${STREAM_SERVER}${movieData.imdb_id}/`;
        } else {
          movieFrame.src = "";
        }
      } catch (err) { console.error(err); }
    }

    function closeModal() {
      backdrop.classList.remove("open");
      document.getElementById("modal").classList.remove("forced-fullscreen");
      fsBtn.textContent = "⛶";
      movieFrame.src = ""; 
      document.body.style.overflow = "";
    }

    closeBtn.addEventListener("click", closeModal);
    backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeModal(); });

    /* ─── BOTÓN DE PANTALLA COMPLETA HACK CSS ───────────── */
    fsBtn.addEventListener("click", () => {
      const modal = document.getElementById("modal");
      modal.classList.toggle("forced-fullscreen");
      if(modal.classList.contains("forced-fullscreen")) {
        fsBtn.textContent = "✕";
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(() => {});
      } else {
        fsBtn.textContent = "⛶";
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      }
    });

    /* ─── BUSCADOR ──────────────────────────────────────── */
    searchEl.addEventListener("input", (e) => {
      const query = e.target.value.toLowerCase().trim();
      displayed = query ? allMovies.filter(m => m.title.toLowerCase().includes(query)) : allMovies;
      renderGrid(displayed);
    });

    function renderSkeletons(count) {
      grid.innerHTML = "";
      for (let i = 0; i < count; i++) { const sk = document.createElement("div"); sk.className = "skeleton"; grid.appendChild(sk); }
    }

    loadMovies();

    /* ═══════════════════════════════════════════════════════
       REGISTRO DE PWA (Habilita la instalación en Chrome)
       ───────────────────────────────────────────────────── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker registrado con éxito"))
        .catch(err => console.log("Fallo en Service Worker", err));
    }

    let deferredPrompt;
    const installBtn = document.getElementById("pwa-install-btn");

    window.addEventListener('beforeinstallprompt', (e) => {
      // Chrome dispara esto si el manifest.json y sw.js están bien configurados
      e.preventDefault();
      deferredPrompt = e;
      // Mostramos el botón de instalación en la barra superior
      installBtn.style.display = "block";
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('El usuario instaló Muzaflix');
          installBtn.style.display = "none";
        }
        deferredPrompt = null;
      }
    });

    window.addEventListener('appinstalled', () => {
      console.log('Muzaflix instalada correctamente');
      installBtn.style.display = "none";
    });
  </script>
</body>
</html>
